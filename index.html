<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eges | Inteligencia Estratégica</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1; /* Un violeta más moderno similar al icono del chat */
            --primary-hover: #4f46e5;
            --dark: #0f172a;
            --text-secondary: #64748b;
            --bg: #f1f5f9;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top right, #e0e7ff, #f1f5f9);
            color: var(--dark);
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; 
        }

        .card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            text-align: center;
            max-width: 420px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .badge-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-bottom: 1rem;
        }

        .badge {
            background: #dcfce7;
            color: #166534;
            padding: 4px 12px;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .pulse {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7);
            animation: pulse-green 2s infinite;
        }

        @keyframes pulse-green {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        h1 { 
            font-size: 1.8rem;
            color: var(--dark); 
            margin-bottom: 1rem; 
            font-weight: 700; 
            letter-spacing: -0.025em;
        }

        p { line-height: 1.6; color: var(--text-secondary); font-size: 1rem; }

        .btn-start {
            margin-top: 1.5rem;
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-start:hover {
            background: var(--primary-hover);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }

        .footer { 
            margin-top: 2.5rem; 
            font-size: 0.75rem; 
            color: #94a3b8;
            border-top: 1px solid #f1f5f9;
            padding-top: 1.5rem;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="badge-container">
            <div class="badge">
                <span class="pulse"></span> Disponible
            </div>
        </div>
        
        <h1>Asistente Eges</h1>
        <p>Bienvenido a la versión de prueba de la base de conocimiento de <strong>Eges</strong>. Este agente ha sido orientado a clientes para responder a todas sus dudas / inquietudes </p>
        <p>Para comenzar, haz click en el chat a la derecha </p>
        <div class="footer">
            <strong>Eges</strong> • Impulsado por Journey Builder
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/gh/debmedia/numiajb-widget@1.0.17/dist/build/static/js/bundle.min.js"></script>

    <journey-builder-chat
        window_title="Base de conocimiento - Agente Eges"
        flow_id="be33dd57-ca93-482c-9236-c00e63588049"
        host_url="https://journeybuilder.numia.co"
        api_key="sk-6VG0-0m9tdK08KEieKuTI6be5dDRY3dZwPZ-lGrM3pc">
    </journey-builder-chat>

</body>
</html>
